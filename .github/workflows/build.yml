name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build package.aix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install aidoku-cli
        run: cargo install --git https://github.com/Aidoku/aidoku-rs aidoku-cli

      - name: Bump version
        run: |
          VERSION=${{ github.run_number }}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          # Update res/source.json
          jq ".info.version = $VERSION" res/source.json > /tmp/source.json && mv /tmp/source.json res/source.json

          # Update index.min.json
          jq ".[0].version = $VERSION" index.min.json > /tmp/index.json && mv /tmp/index.json index.min.json

          echo "Bumped to version $VERSION"

      - name: Build and package
        run: aidoku package .

      - name: Verify package
        run: aidoku verify package.aix

      - name: Prepare Pages directory
        run: |
          mkdir -p _site/sources
          cp package.aix _site/sources/mul.suwayomi-v1.aix
          cp mul.suwayomi-v1.png _site/
          cp index.min.json _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: package.aix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          files: package.aix
          generate_release_notes: true

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
